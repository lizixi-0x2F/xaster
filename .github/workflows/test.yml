name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Neovim ${{ matrix.nvim_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim_version:
          - "v0.10.0"
          - "stable"
          - "nightly"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim_version }}

      - name: Verify Neovim
        run: |
          nvim --version
          nvim --headless -c 'echo "Neovim OK" | quit'

      - name: Install curl (required for agent)
        run: |
          which curl || sudo apt-get update -y && sudo apt-get install -y curl

      - name: Run tests
        run: bash tests/run_tests.sh --verbose

  lint:
    name: Lint (selene + stylua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - name: Setup Luarocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install selene
        run: |
          cargo install selene
          selene --version

      - name: Run selene
        run: |
          selene generate-std
          selene lua/

      - name: Install stylua
        run: |
          cargo install stylua --features lua52
          stylua --version

      - name: Run stylua (check only)
        run: stylua --check lua/ tests/
